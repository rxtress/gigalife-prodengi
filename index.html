<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GigaLife: PROденьги</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:18px}
:root{
  --pri:#21A038;--sec:#5BDB6F;--acc:#FFD700;
  --dan:#FF4B6B;--suc:#00E676;--war:#FF9900;
  --bg:#0B1810;--cbg:#142019;--cbrd:rgba(33,160,56,.28);
  --txt:#FFF;--dim:#8BB895;--glo:rgba(33,160,56,.32)
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Courier New',monospace}

.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(33,160,56,.1) 1px,transparent 1px);
  background-size:40px 40px}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px)}

.screen{position:fixed;inset:0;display:none;flex-direction:column;z-index:10}
.screen.active{display:flex}

/* ══ MENU ══ */
#scr-menu{
  background:
    radial-gradient(ellipse at 15% 90%,rgba(33,160,56,.28) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 10%,rgba(91,219,111,.16) 0%,transparent 50%),
    var(--bg);
  align-items:center;justify-content:center;gap:28px;padding:32px
}
.logo{font-size:clamp(3rem,6vw,5rem);font-weight:700;letter-spacing:2px;
  text-shadow:0 0 24px var(--pri),0 0 60px var(--pri)}
.logo span{color:var(--acc);text-shadow:0 0 24px var(--acc)}
.menu-sub{color:var(--dim);font-size:1.1rem;letter-spacing:4px;text-transform:uppercase;margin-top:6px;text-align:center}
.quest-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;max-width:980px;width:100%}

.quest-card{background:var(--cbg);border:1px solid var(--cbrd);border-radius:18px;padding:28px;
  cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden;
  display:flex;flex-direction:column}
.quest-card::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--pri) 0%,transparent 60%);opacity:0;transition:opacity .25s}
.quest-card:hover{transform:translateY(-6px);border-color:var(--pri);box-shadow:0 10px 44px var(--glo)}
.quest-card:hover::after{opacity:.08}
.qc-num{font-size:.85rem;color:var(--sec);letter-spacing:3px;text-transform:uppercase;margin-bottom:7px}
.qc-title{font-size:1.55rem;font-weight:700;margin-bottom:12px;line-height:1.3}
.qc-desc{font-size:1rem;color:var(--dim);line-height:1.65;margin-bottom:16px;flex:1}
.qc-diff{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.82rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:auto}
.d-easy{background:rgba(0,230,118,.15);color:#00E676;border:1px solid #00E676}
.d-med {background:rgba(255,153,0,.15);color:#FF9900;border:1px solid #FF9900}
.d-hard{background:rgba(255,75,107,.15);color:#FF4B6B;border:1px solid #FF4B6B}

/* ══ INTRO ══ */
#scr-intro{background:var(--bg);align-items:center;justify-content:center;text-align:center}
.intro-wrap{animation:zoomIn .5s ease}
@keyframes zoomIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.intro-label{font-size:.95rem;color:var(--sec);letter-spacing:5px;text-transform:uppercase;margin-bottom:14px}
.intro-big{font-size:clamp(2.8rem,5.5vw,4rem);font-weight:700;text-shadow:0 0 34px var(--pri);margin-bottom:10px}
.intro-small{font-size:1.35rem;color:var(--dim);margin-bottom:38px}
.intro-bar-outer{width:200px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto;overflow:hidden}
.intro-bar-inner{height:100%;width:0;background:var(--pri);border-radius:2px;box-shadow:0 0 8px var(--pri);transition:width 1.8s linear}

/* ══ GAME ══ */
#scr-game{background:var(--bg)}

/* ─ resource bar ─ */
.res-bar{
  display:flex;align-items:center;padding:0 24px;height:84px;
  background:rgba(14,28,18,.97);border-bottom:2px solid var(--cbrd);
  gap:14px;flex-shrink:0;backdrop-filter:blur(12px);overflow:hidden
}
.res-logo{font-size:1.2rem;font-weight:700;flex:1;letter-spacing:1px;white-space:nowrap;min-width:0}
.res-logo span{color:var(--acc)}

/* Stat cards — top right, big and visible */
.stat-cards{display:flex;gap:8px;flex-shrink:0}

.stat-card{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;
  background:rgba(33,160,56,.12);
  border:1.5px solid rgba(33,160,56,.3);
  border-radius:14px;
  padding:8px 14px 10px;
  min-width:112px;
  position:relative;
  overflow:hidden;
  transition:border-color .3s,box-shadow .3s
}
.stat-card.cash-card{border-color:rgba(255,215,0,.35);background:rgba(255,215,0,.08)}
.stat-card.ment-card{border-color:rgba(127,232,255,.3);background:rgba(127,232,255,.07)}
.stat-card.know-card{border-color:rgba(184,255,127,.3);background:rgba(184,255,127,.07)}
.stat-card.cred-card{border-color:rgba(255,159,127,.35);background:rgba(255,159,127,.07)}
.sc-value.cred-c{color:#FF9F7F}

.sc-top{display:flex;align-items:center;gap:7px}
.sc-icon{font-size:1.4rem}
.sc-label{font-size:.68rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
.sc-value{font-size:1.65rem;font-weight:700;line-height:1;letter-spacing:.5px}
.sc-value.cash-c{color:var(--acc)}
.sc-value.ment-c{color:#7FE8FF}
.sc-value.know-c{color:#B8FF7F}

.sc-bar{width:96px;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-top:2px}
.sc-bar-f{height:100%;border-radius:3px;transition:width .6s ease}
.sc-bar-m{background:#7FE8FF;box-shadow:0 0 5px #7FE8FF}
.sc-bar-k{background:#B8FF7F;box-shadow:0 0 5px #B8FF7F}
.sc-bar-c{background:#FF9F7F;box-shadow:0 0 5px #FF9F7F}

/* ─ game content ─ */
.game-main{display:flex;flex:1;gap:22px;padding:20px;overflow:hidden}

.char-area{display:flex;flex-direction:column;align-items:center;
  justify-content:flex-end;width:136px;flex-shrink:0;padding-bottom:8px;position:relative}
#char-canvas{image-rendering:pixelated;image-rendering:crisp-edges;
  width:120px;height:160px;
  filter:drop-shadow(0 0 18px rgba(33,160,56,.65));transition:filter .4s}
.char-name{margin-top:9px;font-size:.88rem;color:var(--sec);letter-spacing:2px;text-transform:uppercase}
.emo-bubble{position:absolute;top:4px;right:-4px;font-size:1.8rem;animation:float 2.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

.text-area{flex:1;display:flex;flex-direction:column;gap:14px;justify-content:center;min-width:0}
.speech-card{
  background:var(--cbg);border:1px solid var(--cbrd);border-radius:18px;
  padding:26px 32px;position:relative;
  box-shadow:0 4px 32px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.04)
}
.speech-card::before{
  content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  border:12px solid transparent;border-right-color:var(--cbg)
}
.step-badge{
  display:inline-block;padding:4px 13px;border-radius:5px;
  font-size:.78rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:13px
}
.b-choice{background:rgba(33,160,56,.25);color:var(--pri);border:1px solid var(--pri)}
.b-event {background:rgba(255,153,0,.25);color:var(--war);border:1px solid var(--war)}
.b-crisis{background:rgba(255,75,107,.25);color:var(--dan);border:1px solid var(--dan)}
.b-info  {background:rgba(91,219,111,.18);color:var(--sec);border:1px solid var(--sec)}
.b-end   {background:rgba(0,230,118,.2); color:var(--suc);border:1px solid var(--suc)}

.step-text{font-size:1.45rem;line-height:1.78;color:var(--txt)}

.hint-panel{background:rgba(91,219,111,.06);border:1px solid rgba(91,219,111,.22);
  border-radius:11px;padding:13px 18px;display:flex;gap:11px;align-items:flex-start}
.hint-ico{font-size:1.05rem;flex-shrink:0;margin-top:3px}
.hint-txt{font-size:.95rem;color:rgba(139,184,149,.95);line-height:1.65}

/* ─ choices ─ */
.choices-area{padding:0 22px 18px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.choice-btn{
  background:rgba(33,160,56,.1);border:1px solid rgba(33,160,56,.3);
  border-radius:11px;padding:14px 22px;color:var(--txt);font-family:inherit;
  font-size:1.18rem;cursor:pointer;text-align:left;transition:all .18s ease;
  line-height:1.5;position:relative;overflow:hidden
}
.choice-btn::before{
  content:'▶';position:absolute;left:16px;top:50%;transform:translateY(-50%);
  color:var(--pri);opacity:0;transition:opacity .18s
}
.choice-btn:hover{
  background:rgba(33,160,56,.22);border-color:var(--pri);
  box-shadow:0 0 20px var(--glo);padding-left:40px
}
.choice-btn:hover::before{opacity:1}

/* ══ CONSEQUENCE POPUP ══ */
.cons-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.76);
  display:flex;align-items:center;justify-content:center;z-index:900;
  backdrop-filter:blur(6px);animation:fadeIn .2s ease
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.cons-card{
  background:var(--cbg);border:1px solid var(--cbrd);border-radius:22px;
  padding:36px 46px;max-width:520px;width:90%;text-align:center;
  box-shadow:0 8px 60px rgba(0,0,0,.7);animation:popIn .3s ease
}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.cons-text{font-size:1.12rem;line-height:1.8;color:var(--txt);margin-bottom:22px}
.cons-stats{display:flex;gap:14px;justify-content:center;margin-bottom:26px;flex-wrap:wrap}
.cons-stat{font-size:1.1rem;font-weight:700;padding:7px 18px;border-radius:9px}
.cs-pos{color:var(--suc);background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.3)}
.cs-neg{color:var(--dan);background:rgba(255,75,107,.12);border:1px solid rgba(255,75,107,.3)}
.cons-btn{
  background:var(--pri);color:#fff;border:none;border-radius:9px;
  padding:13px 40px;font-family:inherit;font-size:1rem;cursor:pointer;
  letter-spacing:1px;box-shadow:0 4px 18px var(--glo);transition:all .2s
}
.cons-btn:hover{background:#28C046;transform:translateY(-2px)}

/* ══ ENDING ══ */
#scr-end{background:var(--bg);align-items:center;justify-content:center}
.end-wrap{
  display:flex;flex-direction:column;align-items:center;gap:24px;
  max-width:620px;padding:40px;text-align:center;animation:zoomIn .5s ease
}
#end-canvas{image-rendering:pixelated;width:120px;height:160px}
.end-title{font-size:2.1rem;font-weight:700}
.end-text{font-size:1.18rem;color:var(--dim);line-height:1.78;max-width:490px}
.end-scores{
  display:flex;gap:32px;background:var(--cbg);border:1px solid var(--cbrd);
  border-radius:16px;padding:24px 40px
}
.es-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.es-ico{font-size:1.6rem}
.es-bar-out{
  width:64px;height:88px;background:rgba(255,255,255,.05);
  border-radius:5px;display:flex;flex-direction:column;justify-content:flex-end;
  overflow:hidden;border:1px solid rgba(255,255,255,.08)
}
.es-bar-in{width:100%;border-radius:5px 5px 0 0;transition:height 1.2s ease;height:0%}
.es-num{font-size:1.1rem;font-weight:700;color:var(--acc)}
.end-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.btn-pri{
  background:var(--pri);color:#fff;border:none;border-radius:9px;
  padding:14px 34px;font-family:inherit;font-size:1.05rem;cursor:pointer;
  letter-spacing:1px;box-shadow:0 4px 20px var(--glo);transition:all .2s
}
.btn-pri:hover{background:#28C046;transform:translateY(-2px)}
.btn-sec{
  background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.22);
  border-radius:9px;padding:14px 34px;font-family:inherit;font-size:1.05rem;
  cursor:pointer;letter-spacing:1px;transition:all .2s
}
.btn-sec:hover{border-color:var(--dim);color:var(--txt);transform:translateY(-2px)}

/* ══ TOASTS ══ */
#toasts{position:fixed;top:94px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:1000;pointer-events:none}
.toast{
  background:var(--cbg);border:1px solid var(--cbrd);border-radius:11px;
  padding:11px 17px;min-width:200px;max-width:300px;
  animation:toastIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.55)
}
@keyframes toastIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(24px)}}
.toast.hide{animation:toastOut .3s ease forwards}
.t-line{font-size:.9rem;padding:2px 0}
.t-pos{color:var(--suc)}.t-neg{color:var(--dan)}.t-neu{color:var(--dim)}

/* ── stat card flash animation ── */
@keyframes statPop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
.stat-pop{animation:statPop .35s ease}

/* ── character idle bounce ── */
@keyframes idleBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
#char-canvas{animation:idleBounce 1.8s ease-in-out infinite}

/* ══ MOBILE ══ */
@media (max-width:768px){
  html{font-size:14px}

  /* ─ menu ─ */
  #scr-menu{justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:28px 16px 40px;gap:20px}
  .logo{font-size:2.1rem;letter-spacing:1px}
  .menu-sub{font-size:.85rem;letter-spacing:2px}
  .quest-grid{grid-template-columns:1fr;gap:14px}
  .quest-card{padding:20px}
  .quest-card:hover{transform:none}
  .qc-title{font-size:1.3rem}

  /* ─ top bar ─ */
  .res-bar{flex-direction:column;height:auto;padding:8px 10px;gap:7px;align-items:stretch}
  .res-logo{font-size:.95rem;flex:none;text-align:center}
  .stat-cards{width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .stat-card{min-width:0;padding:6px 3px 7px;border-radius:10px;gap:2px}
  .sc-top{gap:4px;max-width:100%}
  .sc-icon{font-size:.95rem}
  .sc-label{font-size:.46rem;letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sc-value{font-size:1.05rem}
  .sc-bar{width:85%}

  /* ─ game ─ */
  #scr-game{overflow-y:auto;-webkit-overflow-scrolling:touch}
  .game-main{flex-direction:column;align-items:center;gap:10px;padding:12px;overflow:visible;flex:none}
  .char-area{width:auto;justify-content:center;padding-bottom:0}
  #char-canvas{width:66px;height:88px}
  .char-name{margin-top:5px;font-size:.78rem}
  .emo-bubble{top:-6px;right:-26px;font-size:1.4rem}
  .text-area{width:100%;justify-content:flex-start}
  .speech-card{padding:16px 18px}
  .speech-card::before{display:none}
  .step-text{font-size:1.1rem;line-height:1.6}
  .hint-txt{font-size:.85rem}
  .choices-area{padding:0 12px 18px}
  .choice-btn{font-size:1rem;padding:12px 14px}
  .choice-btn:hover{padding-left:14px;background:rgba(33,160,56,.1);border-color:rgba(33,160,56,.3);box-shadow:none}
  .choice-btn:hover::before{opacity:0}
  .choice-btn:active{background:rgba(33,160,56,.25);border-color:var(--pri);box-shadow:0 0 20px var(--glo)}

  /* ─ popup ─ */
  .cons-card{padding:24px 20px;width:92%}
  .cons-text{font-size:1rem;line-height:1.7}

  /* ─ ending ─ */
  #scr-end{overflow-y:auto;-webkit-overflow-scrolling:touch;align-items:center;justify-content:flex-start}
  .end-wrap{padding:28px 16px 40px;gap:18px}
  .end-title{font-size:1.6rem}
  .end-text{font-size:1.02rem}
  .end-scores{gap:18px;padding:18px 22px}

  /* ─ toasts ─ */
  #toasts{top:auto;bottom:14px;left:12px;right:12px;align-items:flex-end}
  .toast{max-width:none;width:100%}
}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scanlines"></div>

<!-- Bank city background -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMax slice"
  style="position:fixed;inset:0;width:100%;height:100%;z-index:0;opacity:0.48;pointer-events:none">
  <defs>
    <linearGradient id="gSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020906"/>
      <stop offset="60%" stop-color="#071510"/>
      <stop offset="100%" stop-color="#0D2818"/>
    </linearGradient>
    <linearGradient id="gBank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3D2C"/>
      <stop offset="100%" stop-color="#0D1E16"/>
    </linearGradient>
    <linearGradient id="gGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#21A038" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#21A038" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="gLamp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE88A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFE88A" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blur6"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#gSky)"/>

  <!-- Stars -->
  <g fill="#AAFFCC" opacity="0.7">
    <circle cx="120" cy="60" r="1.2"/><circle cx="340" cy="30" r="1"/><circle cx="590" cy="90" r="1.4"/>
    <circle cx="780" cy="45" r="1"/><circle cx="950" cy="20" r="1.5"/><circle cx="1100" cy="70" r="1.1"/>
    <circle cx="1300" cy="35" r="1.3"/><circle cx="1520" cy="55" r="1"/><circle cx="1700" cy="25" r="1.4"/>
    <circle cx="1850" cy="80" r="1.2"/><circle cx="210" cy="130" r="0.9"/><circle cx="460" cy="110" r="1.1"/>
    <circle cx="670" cy="150" r="0.8"/><circle cx="870" cy="100" r="1.2"/><circle cx="1050" cy="140" r="0.9"/>
    <circle cx="1250" cy="115" r="1"/><circle cx="1430" cy="95" r="1.3"/><circle cx="1620" cy="130" r="0.8"/>
    <circle cx="1800" cy="110" r="1.1"/><circle cx="50" cy="190" r="0.9"/><circle cx="430" cy="170" r="1"/>
  </g>

  <!-- Moon -->
  <circle cx="1750" cy="100" r="38" fill="#1E3D2C" opacity="0.9"/>
  <circle cx="1766" cy="88" r="34" fill="#B8FFCC" opacity="0.13"/>

  <!-- Background city skyline LEFT -->
  <g fill="#0C1F14" opacity="0.8">
    <rect x="0" y="480" width="90" height="600"/><rect x="80" y="430" width="70" height="650"/>
    <rect x="140" y="500" width="50" height="580"/><rect x="180" y="460" width="80" height="620"/>
    <rect x="250" y="510" width="60" height="570"/><rect x="300" y="440" width="100" height="640"/>
    <rect x="390" y="470" width="55" height="610"/><rect x="435" y="520" width="70" height="560"/>
  </g>
  <!-- Background city skyline RIGHT -->
  <g fill="#0C1F14" opacity="0.8">
    <rect x="1390" y="490" width="70" height="590"/><rect x="1450" y="450" width="90" height="630"/>
    <rect x="1530" y="510" width="60" height="570"/><rect x="1580" y="460" width="80" height="620"/>
    <rect x="1650" y="480" width="100" height="600"/><rect x="1740" y="500" width="55" height="580"/>
    <rect x="1785" y="440" width="70" height="640"/><rect x="1845" y="515" width="75" height="565"/>
  </g>

  <!-- Subtle windows on city buildings LEFT -->
  <g fill="#21A038" opacity="0.25">
    <rect x="92" y="450" width="8" height="10"/><rect x="105" y="450" width="8" height="10"/>
    <rect x="92" y="470" width="8" height="10"/><rect x="105" y="470" width="8" height="10"/>
    <rect x="190" y="480" width="8" height="10"/><rect x="204" y="480" width="8" height="10"/>
    <rect x="190" y="500" width="8" height="10"/><rect x="204" y="500" width="8" height="10"/>
    <rect x="310" y="460" width="8" height="10"/><rect x="325" y="460" width="8" height="10"/>
    <rect x="310" y="480" width="8" height="10"/><rect x="325" y="480" width="8" height="10"/>
  </g>

    [C._,C._,C.P,C.p,C._,C._,C.p,C.P,C._,C._,C._,C._],
    [C._,C._,C.P,C.P,C._,C._,C.P,C.P,C._,C._,C._,C._],
    [C._,C._,C.Z,C.Z,C.Z,C.Z,C.Z,C.Z,C._,C._,C._,C._],
    [C._,C._,C.z,C.Z,C._,C._,C.Z,C.z,C._,C._,C._,C._]
  ],
  confident:[
    [C._,C._,C.H,C.H,C.H,C.H,C.H,C.h,C._,C._,C._,C._],
    [C._,C.H,C.h,C.h,C.h,C.h,C.h,C.H,C.H,C._,C._,C._],
    [C._,C.H,C.S,C.S,C.S,C.S,C.S,C.S,C.H,C._,C._,C._],
    [C._,C.H,C.d,C.Z,C.Z,C.Z,C.Z,C.d,C.H,C._,C._,C._],
    [C._,C.H,C.d,C.L,C.L,C.L,C.L,C.d,C.H,C._,C._,C._],
    [C._,C.H,C.S,C.u,C.S,C.S,C.u,C.S,C.H,C._,C._,C._],
    [C._,C.H,C.H,C.m,C.H,C.H,C.m,C.H,C.H,C._,C._,C._],
    [C._,C._,C.T,C.T,C.T,C.T,C.T,C.T,C._,C._,C._,C._],
    [C.T,C.T,C.t,C.T,C.T,C.T,C.T,C.t,C.T,C.T,C._,C._],
    [C.T,C.T,C.T,C.t,C.T,C.T,C.t,C.T,C.T,C.T,C._,C._],

  ]
};

// Walk animation frames — only legs differ from neutral
const WALK_A = SPRITES.neutral.map((row,y)=>{
  if(y===13) return [C._,C._,C.P,C.P,C._,C._,C._,C.P,C.P,C.P,C._,C._];
  if(y===14) return [C._,C._,C.Z,C.Z,C._,C._,C._,C.Z,C.Z,C.Z,C._,C._];
  if(y===15) return [C._,C.z,C.Z,C._,C._,C._,C._,C._,C.Z,C.z,C._,C._];
  return row;
});
const WALK_B = SPRITES.neutral.map((row,y)=>{
  if(y===13) return [C.P,C.P,C.P,C._,C._,C._,C.P,C.P,C._,C._,C._,C._];
  if(y===14) return [C.Z,C.Z,C.Z,C._,C._,C._,C.Z,C.Z,C._,C._,C._,C._];
  if(y===15) return [C._,C.z,C.Z,C._,C._,C._,C._,C.Z,C.z,C._,C._,C._];
  return row;
});

let _animTimer=null,_animPhase=0;
function stopCharAnim(){if(_animTimer){clearInterval(_animTimer);_animTimer=null;}}
function startCharAnim(emotion){
  stopCharAnim();
  if(emotion==='neutral'){
    const frames=[SPRITES.neutral,WALK_A,SPRITES.neutral,WALK_B];
    _animPhase=0;
    _animTimer=setInterval(()=>{
      _animPhase=(_animPhase+1)%4;
      drawSpriteRaw('char-canvas',frames[_animPhase]);
    },380);
  }
}
function drawSpriteRaw(canvasId,sprite){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,12,16);
  sprite.forEach((row,y)=>row.forEach((col,x)=>{if(col){ctx.fillStyle=col;ctx.fillRect(x,y,1,1)}}));
}
function drawSprite(canvasId,emotion){
  stopCharAnim();
  drawSpriteRaw(canvasId,SPRITES[emotion]||SPRITES.neutral);
  if(canvasId==='char-canvas') startCharAnim(emotion);
}

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let state={scenario:null,cash:0,mental:50,knowledge:0,creditScore:700,questIdx:0};
function getStep(id){return state.scenario.steps.find(s=>String(s.id)===String(id))}

// ══════════════════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function fmtCash(n){
  const abs=Math.abs(Math.round(n));
  return (n<0?'–':'')+'₽'+abs.toLocaleString('ru-RU');
}

function animPop(el){
  el.classList.remove('stat-pop');
  void el.offsetWidth;
  el.classList.add('stat-pop');
  setTimeout(()=>el.classList.remove('stat-pop'),400);
}

function updateResUI(anim){
  const rCash=document.getElementById('r-cash');
  const rMent=document.getElementById('r-mental');
  const rKnow=document.getElementById('r-know');
  const rCred=document.getElementById('r-cred');
  const barM=document.getElementById('bar-m');
  const barK=document.getElementById('bar-k');
  const barC=document.getElementById('bar-c');

  rCash.textContent=fmtCash(state.cash);
  rMent.textContent=Math.round(state.mental);
  rKnow.textContent=Math.round(state.knowledge);
  rCred.textContent=Math.round(state.creditScore);

  const mp=Math.max(0,Math.min(100,state.mental));
  const kp=Math.max(0,Math.min(100,state.knowledge));
  const cp=Math.max(0,Math.min(100,(state.creditScore-300)/5.5));
  barM.style.width=mp+'%';
  barK.style.width=kp+'%';
  barC.style.width=cp+'%';

  if(anim){
    [rCash,rMent,rKnow,rCred].forEach(el=>animPop(el));
  }
}

// ══════════════════════════════════════════════════════════════
//  TOASTS
// ══════════════════════════════════════════════════════════════
function toast(lines){
  const wrap=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=lines.map(l=>`<div class="t-line ${l.cls}">${l.txt}</div>`).join('');
  wrap.appendChild(t);
  setTimeout(()=>{t.classList.add('hide');setTimeout(()=>t.remove(),350)},2600);
}
function changeLines(cd,md,kd,sd=0){
  const L=[];
  if(cd!==0)L.push({cls:cd>0?'t-pos':'t-neg',txt:`💰 ${cd>0?'+':''}${fmtCash(cd)}`});
  if(md!==0)L.push({cls:md>0?'t-pos':'t-neg',txt:`😊 ${md>0?'+':''}${Math.round(md)} счастья`});
  if(kd!==0)L.push({cls:kd>0?'t-pos':'t-neg',txt:`🧠 ${kd>0?'+':''}${Math.round(kd)} FinIQ`});
  if(sd!==0)L.push({cls:sd>0?'t-pos':'t-neg',txt:`💳 Credit Score ${sd>0?'+':''}${Math.round(sd)}`});
  return L;
}

// ══════════════════════════════════════════════════════════════
//  MENU
// ══════════════════════════════════════════════════════════════
function buildMenu(){
  const grid=document.getElementById('quest-grid');
  grid.innerHTML='';
  const diffCls={легкий:'d-easy',средний:'d-med',сложный:'d-hard'};
  SCENARIOS.forEach((sc,i)=>{
    const card=document.createElement('div');
    card.className='quest-card';
    card.innerHTML=`
      <div class="qc-num">КВЕСТ ${i+1}</div>
      <div class="qc-title">${sc.title}</div>
      <div class="qc-desc">${sc.desc}</div>
      <span class="qc-diff ${diffCls[sc.difficulty]||'d-easy'}">${sc.difficulty}</span>`;
    card.onclick=()=>startQuest(i);
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════════════
//  START QUEST
// ══════════════════════════════════════════════════════════════
function startQuest(idx){
  state.scenario=SCENARIOS[idx];
  state.questIdx=idx;
  state.cash=state.scenario.startCash;
  state.mental=50;
  state.knowledge=0;
  state.creditScore=700;

  document.getElementById('game-main').style.background=
    `linear-gradient(160deg, var(--bg) 0%, ${state.scenario.bg} 100%)`;

  const labels=['КВЕСТ 1 — БЮДЖЕТ','КВЕСТ 2 — КРЕДИТЫ','КВЕСТ 3 — ИНВЕСТИЦИИ'];
  document.getElementById('intro-label').textContent=labels[idx];
  document.getElementById('intro-big').textContent=state.scenario.title;
  document.getElementById('intro-small').textContent=state.scenario.subtitle;
  showScreen('scr-intro');

  const bar=document.getElementById('intro-bar');
  bar.style.width='0';
  setTimeout(()=>{bar.style.width='100%'},50);
  setTimeout(()=>loadStep(1),2100);
}

// ══════════════════════════════════════════════════════════════
//  LOAD STEP
// ══════════════════════════════════════════════════════════════
const BADGE_MAP={
  choice:'b-choice',event:'b-event',crisis:'b-crisis',ending:'b-end',
  briefing:'b-info',conservative_path:'b-info',moderate_path:'b-info',
  aggressive_path:'b-info',investigation:'b-choice',reflection:'b-info',
  crisis_event:'b-crisis',year_result:'b-end',portfolio_review:'b-info',final_reflection:'b-info'
};
const BADGE_TXT={
  choice:'ВЫБОР',event:'СОБЫТИЕ',crisis:'КРИЗИС',ending:'ИТОГ',
  briefing:'БРИФИНГ',conservative_path:'ПУТЬ',moderate_path:'ПУТЬ',
  aggressive_path:'ПУТЬ',investigation:'РАССЛЕДОВАНИЕ',reflection:'РЕФЛЕКСИЯ',
  crisis_event:'КРИЗИС',year_result:'ИТОГ ГОДА',portfolio_review:'АНАЛИЗ',final_reflection:'ВЫВОДЫ'
};
const EMOTION_MAP={
  end_excellent:'happy',end_wise:'confident',end_experienced:'confident',
  end_good:'happy',end_medium:'neutral',end_bad:'sad',
  end_scam:'scared',end_spiral:'scared',end_gamble:'sad'
};

function loadStep(stepId){
  showScreen('scr-game');
  const step=getStep(stepId);
  if(!step){console.warn('Step not found:',stepId);return;}
  if(step.type==='ending'){showEnding(step);return;}

  const emo=typeof stepId==='string'?(EMOTION_MAP[stepId]||'neutral'):'neutral';
  drawSprite('char-canvas',emo);
  document.getElementById('emo-bubble').textContent=
    {neutral:'💭',happy:'😊',sad:'😟',scared:'😨',confident:'😎'}[emo]||'💭';

  const badge=document.getElementById('step-badge');
  badge.className='step-badge '+(BADGE_MAP[step.type]||'b-info');
  badge.textContent=BADGE_TXT[step.type]||'ШАГ';

  document.getElementById('step-text').textContent=step.text;

  const hp=document.getElementById('hint-panel');
  if(step.hint){
    document.getElementById('hint-txt').textContent=step.hint;
    hp.style.display='flex';
  }else{
    hp.style.display='none';
  }

  const area=document.getElementById('choices-area');
  area.innerHTML='';
  (step.options||[]).forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=opt.text;
    btn.onclick=()=>choose(step,opt);
    area.appendChild(btn);
  });

  updateResUI(false);
}

// ══════════════════════════════════════════════════════════════
//  CHOICE
// ══════════════════════════════════════════════════════════════
function choose(step,opt){
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const cd=opt.cashChange||0,md=opt.mentalChange||0,kd=opt.knowledgeChange||0,sd=opt.creditScoreChange||0;
  state.cash+=cd;
  state.mental=Math.max(0,Math.min(100,state.mental+md));
  state.knowledge=Math.max(0,Math.min(100,state.knowledge+kd));
  state.creditScore=Math.max(300,Math.min(850,state.creditScore+sd));
  updateResUI(true);
  toast(changeLines(cd,md,kd,sd));
  showConsequence(opt.consequence,cd,md,kd,sd,()=>loadStep(opt.next));
}

// ══════════════════════════════════════════════════════════════
//  CONSEQUENCE POPUP
// ══════════════════════════════════════════════════════════════
function showConsequence(text,cd,md,kd,sd,onContinue){
  const overlay=document.createElement('div');
  overlay.className='cons-overlay';
  const stats=[
    cd!==0?`<span class="cons-stat ${cd>0?'cs-pos':'cs-neg'}">💰 ${cd>0?'+':''}${fmtCash(cd)}</span>`:'',
    md!==0?`<span class="cons-stat ${md>0?'cs-pos':'cs-neg'}">😊 ${md>0?'+':''}${Math.round(md)}</span>`:'',
    kd!==0?`<span class="cons-stat ${kd>0?'cs-pos':'cs-neg'}">🧠 ${kd>0?'+':''}${Math.round(kd)}</span>`:'',
    sd!==0?`<span class="cons-stat ${sd>0?'cs-pos':'cs-neg'}">💳 ${sd>0?'+':''}${Math.round(sd)}</span>`:''
  ].filter(Boolean).join('');
  overlay.innerHTML=`
    <div class="cons-card">
      <p class="cons-text">${text}</p>
      ${stats?`<div class="cons-stats">${stats}</div>`:''}
      <button class="cons-btn">Продолжить →</button>
    </div>`;
  document.body.appendChild(overlay);
  let used=false;
  const go=()=>{if(used)return;used=true;overlay.style.opacity='0';overlay.style.transition='opacity .15s';setTimeout(()=>{overlay.remove();onContinue()},160)};
  overlay.querySelector('.cons-btn').onclick=go;
  setTimeout(go,4200);
}

// ══════════════════════════════════════════════════════════════
//  ENDING
// ══════════════════════════════════════════════════════════════
function showEnding(step){
  const emo=step.emotion||EMOTION_MAP[step.id]||'neutral';
  drawSprite('end-canvas',emo);
  const titles={happy:'🎉 ОТЛИЧНАЯ РАБОТА!',confident:'😎 МАСТЕРСКИЙ РЕЗУЛЬТАТ!',neutral:'📊 КВЕСТ ЗАВЕРШЁН',sad:'😔 УРОК ПОЛУЧЕН',scared:'😨 ЧТО-ТО ПОШЛО НЕ ТАК'};
  document.getElementById('end-title').textContent=titles[emo]||'ИТОГ';
  document.getElementById('end-text').textContent=step.text;
  const sc=step.score||{cash:50,mental:50,knowledge:50};
  setTimeout(()=>{
    document.getElementById('esb-cash').style.height=sc.cash+'%';
    document.getElementById('esb-ment').style.height=sc.mental+'%';
    document.getElementById('esb-know').style.height=sc.knowledge+'%';
    document.getElementById('esn-cash').textContent=sc.cash;
    document.getElementById('esn-ment').textContent=sc.mental;
    document.getElementById('esn-know').textContent=sc.knowledge;
  },200);

  const btns=document.getElementById('end-btns');
  btns.innerHTML='';

  if(state.questIdx<SCENARIOS.length-1&&(emo==='happy'||emo==='confident')){
    const nb=document.createElement('button');
    nb.className='btn-pri';nb.style.background='#28C046';nb.style.boxShadow='0 4px 18px rgba(33,160,56,.45)';
    nb.textContent='Следующий квест →';nb.onclick=()=>startQuest(state.questIdx+1);
    btns.appendChild(nb);
  }
  const rb=document.createElement('button');
  rb.className='btn-pri';rb.textContent='Пройти ещё раз';rb.onclick=()=>startQuest(state.questIdx);
  btns.appendChild(rb);
  const mb=document.createElement('button');
  mb.className='btn-sec';mb.textContent='← Выбор квеста';mb.onclick=()=>showScreen('scr-menu');
  btns.appendChild(mb);

  showScreen('scr-end');
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
buildMenu();
drawSprite('char-canvas','neutral');
drawSprite('end-canvas','neutral');
</script>
